schema_version: 1

context:
  name: videoio
  version: "0.3.0"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/v/videoio/videoio-${{ version }}.tar.gz
  sha256: ff006088c9dc5bdd7ea73a7317177d0c3e67033114f68711a43d0b66bfc0e492

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - ffmpeg
    - ffmpeg-python
    - numpy
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - videoio
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - pip check
      - python run_test.py
    files:
      recipe:
        - run_test.py
    requirements:
      run:
        - pip
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/vguzov/videoio
  repository: https://github.com/vguzov/videoio
  summary: A small library for saving and loading RGB and uint16 (depth) frames as H.264 encoded video
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jeongseok-meta
